<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard IQA</title>
  
  <!-- ICON -->
  <link rel="icon" type="image/png" href="https://i.postimg.cc/P5mHRSFW/R1.png">
  <link rel="shortcut icon" type="image/png" href="https://i.postimg.cc/P5mHRSFW/R1.png">
  
  <!-- REDIRECT -->
  <meta http-equiv="refresh" content="2; url=https://script.google.com/macros/s/AKfycbzvNf08_orw_8NKKfK-rKcTkQHQIdfpa8PICSZwvccTP5qoSHkn5y4L-rEyQgDbRubg/exec">
  
  <style>
    /* ===== RESET ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0A2463 0%, #1E3A8A 40%, #059669 80%, #34D399 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    
    /* ===== KOTAK UTAMA ===== */
    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 50px 60px 40px;
      text-align: center;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.10);
      animation: fadeInUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }
    
    /* ===== EFEK GLOW DI BELAKANG ===== */
    .container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 50%, rgba(59, 130, 246, 0.10), transparent 60%);
      animation: glowPulse 4s ease-in-out infinite;
      pointer-events: none;
    }
    
    @keyframes glowPulse {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.5; }
      50% { transform: scale(1.2) rotate(5deg); opacity: 1; }
    }
    
    /* ===== LOGO ===== */
    .logo-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }
    
    .logo-wrapper img {
      width: 130px;
      height: auto;
      display: block;
      margin: 0 auto;
      filter: drop-shadow(0 8px 40px rgba(59, 130, 246, 0.35));
      animation: logoFloat 3s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }
    
    @keyframes logoFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.02); }
    }
    
    /* ===== RING SPINNER ===== */
    .spinner-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 170px;
      height: 170px;
      border-radius: 50%;
      border: 3px solid transparent;
      animation: spinRing 2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      z-index: 1;
    }
    
    .spinner-ring:nth-child(2) {
      width: 190px;
      height: 190px;
      border-top-color: rgba(52, 211, 153, 0.4);
      border-bottom-color: rgba(52, 211, 153, 0.4);
      animation-duration: 2.5s;
    }
    
    .spinner-ring:nth-child(3) {
      width: 150px;
      height: 150px;
      border-left-color: rgba(59, 130, 246, 0.3);
      border-right-color: rgba(59, 130, 246, 0.3);
      animation-duration: 1.8s;
      animation-direction: reverse;
    }
    
    @keyframes spinRing {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    
    /* ===== TULISAN ===== */
    .title {
      font-size: 26px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: 2px;
      position: relative;
      z-index: 2;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.15);
      margin-bottom: 4px;
    }
    
    .title span {
      background: linear-gradient(90deg, #34D399, #3B82F6, #34D399);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmerText 3s ease-in-out infinite;
    }
    
    @keyframes shimmerText {
      0%, 100% { background-position: -200% 0; }
      50% { background-position: 200% 0; }
    }
    
    .subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.50);
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 300;
      margin-bottom: 20px;
      position: relative;
      z-index: 2;
    }
    
    /* ===== PROGRESS BAR ===== */
    .progress-wrapper {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.10);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      z-index: 2;
      margin-top: 10px;
    }
    
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #34D399, #3B82F6);
      border-radius: 4px;
      animation: progressAnim 2s ease-in-out forwards;
    }
    
    @keyframes progressAnim {
      0% { width: 0%; }
      100% { width: 100%; }
    }
    
    /* ===== TEKS LOADING ===== */
    .loading-text {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.40);
      margin-top: 14px;
      letter-spacing: 1px;
      position: relative;
      z-index: 2;
      animation: dotPulse 1.5s ease-in-out infinite;
    }
    
    @keyframes dotPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    
    /* ===== ANIMASI MASUK ===== */
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(30px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    
    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .container {
        padding: 35px 25px 30px;
      }
      .logo-wrapper img {
        width: 100px;
      }
      .spinner-ring {
        width: 130px;
        height: 130px;
      }
      .spinner-ring:nth-child(2) {
        width: 150px;
        height: 150px;
      }
      .spinner-ring:nth-child(3) {
        width: 110px;
        height: 110px;
      }
      .title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- LOGO + RING SPINNER -->
    <div class="logo-wrapper">
      <div class="spinner-ring"></div>
      <div class="spinner-ring"></div>
      <div class="spinner-ring"></div>
      <img src="https://i.postimg.cc/P5mHRSFW/R1.png" alt="Logo IQA">
    </div>
    
    <!-- TULISAN -->
    <div class="title">DASHBOARD <span>IQA</span></div>
    <div class="subtitle">PG. KREBET BARU</div>
    
    <!-- PROGRESS BAR -->
    <div class="progress-wrapper">
      <div class="progress-bar"></div>
    </div>
    
    <!-- TEKS LOADING -->
    <div class="loading-text">⏳ Mengarahkan ke Dashboard...</div>
    
  </div>

</body>
</html>
